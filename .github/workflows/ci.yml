name: My first pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4   
      - name: build image
        run: | 
         docker build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}} .
         docker build -t ${{secrets.DOCKER_USERNAME}}/ciportfolio .
      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} 
     
      - name: push image to registry
        run: | 
         docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio:${{github.run_number}}
         docker push ${{secrets.DOCKER_USERNAME}}/ciportfolio
  
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
       - name: ssh to linux and run container
         uses: appleboy/ssh-action@v6
         with:
            host: ${{ secrets.HOST }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.PRIVATE_KEY }}
            port: ${{ secrets.PORT }}
            script: |
                docker rm -f portfolio || echo "Container not found, skipping removal" 
                docker run -d --name portfolio -p 8080:80 ${{secrets.DOCKER_USERNAME}}/ciportfolio                            

         